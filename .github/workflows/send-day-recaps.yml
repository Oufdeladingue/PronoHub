name: Send Day Recaps

on:
  schedule:
    # Exécution quotidienne à 7h UTC (8h heure française)
    - cron: '0 7 * * *'

  # Permet de déclencher manuellement depuis GitHub UI
  workflow_dispatch:

jobs:
  send-day-recaps:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 📊 Trigger send-day-recaps cron
        run: |
          response=$(curl -X GET --max-time 200 --connect-timeout 20 \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -w "\n%{http_code}" \
            -s \
            https://www.pronohub.club/api/cron/send-day-recaps)

          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | sed '$d')

          echo "HTTP Status: $http_code"
          echo "Response: $body"

          # Afficher de manière lisible si c'est du JSON
          if command -v jq &> /dev/null; then
            echo "$body" | jq '.' || echo "$body"
          else
            echo "$body"
          fi

          # Vérifier le code HTTP
          if [ "$http_code" -ne 200 ]; then
            echo "❌ Erreur: HTTP $http_code"
            exit 1
          fi

          echo "✅ Cron exécuté avec succès"

      - name: 📊 Log execution time
        if: always()
        run: |
          echo "Execution time (UTC): $(date -u +"%Y-%m-%d %H:%M:%S")"
          echo "Execution time (Paris): $(TZ=Europe/Paris date +"%Y-%m-%d %H:%M:%S")"
