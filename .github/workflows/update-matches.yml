name: Update Matches

on:
  schedule:
    # Exécution quotidienne à 6h UTC (7h heure française) - sync des nouveaux matchs
    - cron: '0 6 * * *'
    # Exécution à 0h UTC (1h heure française) - finalisation des tournois après les matchs
    - cron: '0 0 * * *'

  # Permet de déclencher manuellement depuis GitHub UI
  workflow_dispatch:

jobs:
  update-matches:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: ⚽ Trigger update-matches cron
        run: |
          response=$(curl -X GET --max-time 200 --connect-timeout 20 --retry 2 --retry-delay 20 --retry-all-errors \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -w "\n%{http_code}" \
            -s \
            https://www.pronohub.club/api/cron/update-matches?force=true)

          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | sed '$d')

          echo "HTTP Status: $http_code"
          echo "Response: $body"

          # Afficher de manière lisible si c'est du JSON
          if command -v jq &> /dev/null; then
            echo "$body" | jq '.' || echo "$body"
          else
            echo "$body"
          fi

          # Vérifier le code HTTP
          if [ "$http_code" -ne 200 ]; then
            echo "❌ Erreur: HTTP $http_code"
            exit 1
          fi

          echo "✅ Cron exécuté avec succès"

      - name: 📊 Log execution time
        if: always()
        run: |
          echo "Execution time (UTC): $(date -u +"%Y-%m-%d %H:%M:%S")"
          echo "Execution time (Paris): $(TZ=Europe/Paris date +"%Y-%m-%d %H:%M:%S")"
